[project]
nav = [
    { "Rory" = "index.md"},
    { "Get started" = "get-started.md"},
    { "Platform Architecture" = "architecture.md"},
    { "API Reference" = "api.md"},
]

site_name = "Rory"

site_description = "Official documentation for the Rory platform client: architecture, deployment, and usage."

site_author = "ShanelReyes"
extra_css = ["stylesheets/extra.css"]

copyright = """
Copyright &copy; 2026 Shanel - Rory project
"""

[project.theme]

# change this to "classic" to use the traditional Material for MkDocs look.
variant = "classic"
language = "en"
logo = "images/logo_rory_sf.svg"
favicon = "images/logo_rory_sf.svg"

features = [
    "announce.dismiss",
    "content.code.annotate",
    "content.code.copy",
    "content.code.select",
    "content.footnote.tooltips",
    "content.tabs.link",
    "content.tooltips",
    "navigation.footer",
    "navigation.indexes",
    "navigation.instant",
    "navigation.instant.prefetch",
    "navigation.path",
    "navigation.sections",
    "navigation.top",
    "navigation.tracking",
    "search.highlight",
    "navigation.indexes",
    "navigation.sections"
]


# [[project.theme.palette]]
# scheme = "default"
# toggle.icon = "lucide/sun"
# toggle.name = "Switch to dark mode"

# [[project.theme.palette]]
# scheme = "slate"
# toggle.icon = "lucide/moon"
# toggle.name = "Switch to light mode"

[[project.theme.palette]]
scheme = "default"
primary = "deep-purple"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
scheme = "slate"
primary = "deep-purple"
accent = "deep-purple"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"


[project.plugins.mkdocstrings.handlers.python]
inventories = ["https://docs.python.org/3/objects.inv"]
paths = ["roryclient"]

[project.plugins.mkdocstrings.handlers.python.options]
docstring_style = "google"
inherited_members = true
show_source = false
